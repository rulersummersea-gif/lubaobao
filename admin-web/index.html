<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>炉保保后台</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "PingFang SC", sans-serif; background: #f5f7fb; color: #0f172a; }
    .wrap { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .side { background: #0f172a; color: #cbd5e1; padding: 18px 14px; }
    .side h1 { margin: 0 0 8px; color: #fff; font-size: 22px; }
    .side .muted { color: #94a3b8; font-size: 13px; margin-bottom: 18px; }
    .nav button { width: 100%; min-height: 44px; margin: 5px 0; border: 0; border-radius: 8px; background: #1e293b; color: #e2e8f0; text-align: left; padding: 0 12px; cursor: pointer; font-size: 15px; }
    .nav button.active { background: #2563eb; color: #fff; }
    .main { padding: 20px; }
    .topbar, .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
    .topbar { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .title { font-size: 22px; font-weight: 800; margin: 0; }
    .muted { color: #64748b; font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(140px, 1fr)); gap: 12px; }
    .kpi { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px; }
    .kpi b { display: block; margin-top: 8px; font-size: 24px; }
    .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    input, select { min-height: 40px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 0 10px; font-size: 14px; background: #fff; }
    button { min-height: 40px; border: 0; border-radius: 8px; padding: 0 14px; background: #2563eb; color: #fff; cursor: pointer; font-size: 14px; }
    button.secondary { background: #e2e8f0; color: #0f172a; }
    button.warn { background: #f59e0b; }
    button.danger { background: #dc2626; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; background: #fff; }
    th, td { border-bottom: 1px solid #e2e8f0; padding: 10px; text-align: left; vertical-align: top; }
    th { color: #475569; font-size: 13px; background: #f8fafc; }
    .tag { display: inline-block; border-radius: 999px; padding: 4px 9px; font-size: 12px; font-weight: 700; background: #dbeafe; color: #1d4ed8; }
    .tag.ok { background: #dcfce7; color: #166534; }
    .tag.warn { background: #fef3c7; color: #92400e; }
    .detail-grid { display: grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap: 10px; margin-bottom: 12px; }
    .detail-cell { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; }
    .detail-cell span { display: block; color: #64748b; font-size: 12px; margin-bottom: 6px; }
    .detail-cell b { font-size: 16px; }
    .image-box { display: grid; grid-template-columns: minmax(220px, 360px) 1fr; gap: 14px; align-items: start; margin-top: 12px; }
    .image-box img { width: 100%; max-height: 320px; object-fit: contain; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; }
    .empty { color: #64748b; background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 8px; padding: 18px; text-align: center; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0b1020; color: #dbeafe; padding: 12px; border-radius: 8px; max-height: 360px; overflow: auto; }
    .tab { display: none; }
    .tab.active { display: block; }
    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
      .side { position: static; }
      .grid { grid-template-columns: 1fr 1fr; }
      .detail-grid, .image-box { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <aside class="side">
    <h1>炉保保后台</h1>
    <div class="muted" id="who">未登录</div>
    <div class="nav">
      <button data-tab="dashboard" class="active">仪表盘</button>
      <button data-tab="packs">材料包管理</button>
      <button data-tab="boilers">锅炉管理</button>
      <button data-tab="inspections">巡检记录</button>
      <button data-tab="users">用户权限</button>
      <button data-tab="reports">月报中心</button>
      <button data-tab="debug">接口输出</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <p class="title">运营管理台</p>
        <div class="muted">管理企业锅炉、材料包和巡检记录</div>
      </div>
      <div class="row">
        <input id="base" value="/api" style="width:220px">
        <input id="username" value="admin" placeholder="用户名">
        <input id="password" value="Admin@123" type="password" placeholder="密码">
        <button id="loginBtn">登录</button>
        <button class="secondary" id="refreshBtn">刷新</button>
      </div>
    </div>

    <section id="dashboard" class="tab active">
      <div class="grid">
        <div class="kpi"><span>API 状态</span><b id="apiState">-</b></div>
        <div class="kpi"><span>锅炉数量</span><b id="boilerCount">-</b></div>
        <div class="kpi"><span>材料包数量</span><b id="packCount">-</b></div>
        <div class="kpi"><span>巡检记录</span><b id="inspectionCount">-</b></div>
      </div>
    </section>

    <section id="packs" class="tab">
      <div class="card">
        <h2>材料包入库</h2>
        <div class="row">
          <input id="packCode" value="PACK-002" placeholder="材料包编码">
          <input id="packType" value="基础版" placeholder="类型">
          <input id="packExpire" value="2027-12-31" placeholder="有效期">
          <button id="createPackBtn">入库</button>
          <button class="secondary" id="loadPacksBtn">刷新列表</button>
        </div>
      </div>
      <div class="card">
        <h2>材料包列表</h2>
        <table><thead><tr><th>ID</th><th>编码</th><th>状态</th><th>锅炉</th><th>有效期</th><th>操作</th></tr></thead><tbody id="packsBody"></tbody></table>
      </div>
    </section>

    <section id="boilers" class="tab">
      <div class="card">
        <h2>新增锅炉</h2>
        <div class="row">
          <input id="bDevice" value="D-1002" placeholder="设备代码">
          <input id="bProduct" value="P-1002" placeholder="产品编号">
          <input id="bModel" value="DZL6-1.25" placeholder="型号">
          <input id="bType" value="蒸汽锅炉" placeholder="设备类型">
          <button id="createBoilerBtn">新增锅炉</button>
          <button class="secondary" id="loadBoilersBtn">刷新列表</button>
        </div>
      </div>
      <div class="card">
        <h2>锅炉列表</h2>
        <table><thead><tr><th>ID</th><th>名称</th><th>设备代码</th><th>型号</th><th>状态</th></tr></thead><tbody id="boilersBody"></tbody></table>
      </div>
    </section>

    <section id="inspections" class="tab">
      <div class="card">
        <div class="row">
          <h2 style="margin-right:auto">巡检记录</h2>
          <select id="inspectionStatus">
            <option value="">全部状态</option>
            <option value="created">created</option>
            <option value="uploaded">uploaded</option>
            <option value="done">done</option>
            <option value="submitted">submitted</option>
          </select>
          <input id="inspectionBoiler" placeholder="锅炉ID">
          <button class="secondary" id="loadInspectionsBtn">刷新记录</button>
        </div>
        <table><thead><tr><th>ID</th><th>锅炉</th><th>材料包</th><th>状态</th><th>评分</th><th>摘要</th><th>图片</th><th>操作</th></tr></thead><tbody id="inspectionsBody"></tbody></table>
      </div>
      <div class="card">
        <h2>记录详情</h2>
        <div id="inspectionDetail" class="empty">请选择一条巡检记录查看详情</div>
      </div>
    </section>

    <section id="users" class="tab">
      <div class="card">
        <h2 id="userFormTitle">新增用户</h2>
        <div class="row">
          <input id="userId" type="hidden">
          <input id="userAccount" placeholder="账号">
          <input id="userName" placeholder="姓名">
          <select id="userRole">
            <option value="inspector">巡检员</option>
            <option value="enterprise_admin">企业管理员</option>
            <option value="platform_admin">平台管理员</option>
          </select>
          <input id="userEnterprise" value="1" placeholder="企业ID">
          <input id="userPassword" type="password" placeholder="初始密码/新密码">
          <button id="saveUserBtn">保存用户</button>
          <button class="secondary" id="resetUserFormBtn">清空</button>
        </div>
      </div>
      <div class="card">
        <div class="row">
          <h2 style="margin-right:auto">用户权限</h2>
          <button class="secondary" id="loadUsersBtn">刷新用户</button>
        </div>
        <table><thead><tr><th>ID</th><th>账号</th><th>姓名</th><th>角色</th><th>企业</th><th>状态</th><th>操作</th></tr></thead><tbody id="usersBody"></tbody></table>
      </div>
    </section>

    <section id="reports" class="tab">
      <div class="card">
        <h2>月报查询</h2>
        <div class="row">
          <input id="reportEnterprise" value="1" placeholder="企业ID">
          <input id="reportMonth" value="2026-07" placeholder="月份">
          <button id="loadReportBtn">查询月报</button>
        </div>
        <pre id="reportOut">{}</pre>
      </div>
    </section>

    <section id="debug" class="tab">
      <div class="card">
        <h2>接口输出</h2>
        <pre id="debugOut">{}</pre>
      </div>
    </section>
  </main>
</div>

<script>
const $ = (id) => document.getElementById(id);
const state = { token: localStorage.getItem('LB_ADMIN_TOKEN') || '', user: JSON.parse(localStorage.getItem('LB_ADMIN_USER') || 'null'), users: [] };

function base() { return $('base').value.trim() || '/api'; }
function showDebug(v) { $('debugOut').textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2); }
function headers() { return { 'Content-Type': 'application/json', ...(state.token ? { Authorization: 'Bearer ' + state.token } : {}) }; }
async function api(path, options = {}) {
  const res = await fetch(base() + path, { ...options, headers: { ...headers(), ...(options.headers || {}) } });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch { data = text; }
  if (!res.ok) throw data;
  showDebug(data);
  return data;
}
function tag(status) {
  const cls = ['activated', 'submitted', 'done', 'normal', 'active'].includes(String(status)) ? 'ok' : 'warn';
  return `<span class="tag ${cls}">${status || '-'}</span>`;
}
function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}
function setWho() {
  $('who').textContent = state.user ? `${state.user.name || state.user.username} / ${state.user.role}` : '未登录';
}
function switchTab(id) {
  document.querySelectorAll('.tab').forEach((el) => el.classList.toggle('active', el.id === id));
  document.querySelectorAll('.nav button').forEach((el) => el.classList.toggle('active', el.dataset.tab === id));
}

async function login() {
  const data = await api('/auth/admin-login', { method: 'POST', body: JSON.stringify({ username: $('username').value.trim(), password: $('password').value }) });
  state.token = data.token;
  state.user = data.user;
  localStorage.setItem('LB_ADMIN_TOKEN', state.token);
  localStorage.setItem('LB_ADMIN_USER', JSON.stringify(state.user));
  setWho();
  await refreshAll();
}
async function loadDashboard() {
  const root = await api('/');
  $('apiState').textContent = root.version || 'OK';
  const [boilers, packs, inspections] = await Promise.all([api('/boilers'), api('/material-packs?enterpriseId=1'), api('/inspections')]);
  $('boilerCount').textContent = boilers.length;
  $('packCount').textContent = packs.length;
  $('inspectionCount').textContent = inspections.length;
}
async function loadPacks() {
  const packs = await api('/material-packs?enterpriseId=1');
  $('packsBody').innerHTML = packs.map((p) => `
    <tr>
      <td>${p.id}</td><td>${p.code}</td><td>${tag(p.status)}</td><td>${p.boilerId || '-'}</td><td>${p.expireAt || '-'}</td>
      <td>
        <button class="secondary" onclick="activatePack('${p.code}')">绑定1001</button>
        <button class="secondary" onclick="unbindPack('${p.code}')">解绑</button>
        <button class="warn" onclick="invalidatePack('${p.code}')">作废</button>
      </td>
    </tr>`).join('');
}
async function createPack() {
  await api('/material-packs', { method: 'POST', body: JSON.stringify({ code: $('packCode').value.trim(), type: $('packType').value.trim(), expireAt: $('packExpire').value.trim(), enterpriseId: 1 }) });
  await loadPacks();
}
async function activatePack(code) {
  await api('/material-packs/activate', { method: 'POST', body: JSON.stringify({ code, enterpriseId: 1, boilerId: 1001 }) });
  await loadPacks();
}
async function unbindPack(code) {
  await api('/material-packs/unbind', { method: 'POST', body: JSON.stringify({ code }) });
  await loadPacks();
}
async function invalidatePack(code) {
  if (!confirm(`确认作废材料包 ${code}？`)) return;
  await api('/material-packs/invalidate', { method: 'POST', body: JSON.stringify({ code }) });
  await loadPacks();
}
async function loadBoilers() {
  const boilers = await api('/boilers');
  $('boilersBody').innerHTML = boilers.map((b) => `<tr><td>${b.id}</td><td>${b.name}</td><td>${b.deviceCode || '-'}</td><td>${b.model || '-'}</td><td>${tag(b.status)}</td></tr>`).join('');
}
async function createBoiler() {
  await api('/boilers', { method: 'POST', body: JSON.stringify({ enterpriseId: 1, deviceCode: $('bDevice').value.trim(), productNo: $('bProduct').value.trim(), model: $('bModel').value.trim(), deviceType: $('bType').value.trim() }) });
  await loadBoilers();
}
async function loadInspections() {
  const params = new URLSearchParams();
  if ($('inspectionStatus').value) params.set('status', $('inspectionStatus').value);
  if ($('inspectionBoiler').value) params.set('boilerId', $('inspectionBoiler').value);
  const list = await api('/inspections' + (params.toString() ? '?' + params.toString() : ''));
  $('inspectionsBody').innerHTML = list.map((i) => `
    <tr>
      <td>${i.inspectionId}</td><td>${i.boilerName || i.boilerId}</td><td>${i.materialPackId}</td><td>${tag(i.status)}</td><td>${i.score || '-'}</td><td>${i.summary || '-'}</td>
      <td>${i.imageUrl ? `<a href="${base()}${i.imageUrl}" target="_blank">查看</a>` : '-'}</td>
      <td><button class="secondary" onclick="loadInspectionDetail(${i.inspectionId})">详情</button></td>
    </tr>`).join('');
}
async function loadInspectionDetail(id) {
  const detail = await api('/records/' + id);
  renderInspectionDetail(detail);
}
function renderInspectionDetail(detail) {
  const items = detail.items || [];
  const diagnosis = detail.diagnosis || [];
  const imageUrl = detail.imageUrl ? base() + detail.imageUrl : '';
  $('inspectionDetail').className = '';
  $('inspectionDetail').innerHTML = `
    <div class="detail-grid">
      <div class="detail-cell"><span>巡检ID</span><b>${esc(detail.inspectionId || '-')}</b></div>
      <div class="detail-cell"><span>状态</span><b>${tag(detail.status)}</b></div>
      <div class="detail-cell"><span>健康评分</span><b>${esc(detail.score || '-')}</b></div>
      <div class="detail-cell"><span>提交时间</span><b>${esc(detail.submittedAt || '-')}</b></div>
    </div>
    <div class="detail-cell" style="margin-bottom:12px;"><span>摘要</span><b>${esc(detail.summary || '暂无摘要')}</b></div>
    <h3>检测明细</h3>
    <table>
      <thead><tr><th>项目</th><th>检测值</th><th>状态</th><th>正常范围</th></tr></thead>
      <tbody>${items.map((item) => `<tr><td>${esc(item.name)}</td><td>${esc(item.value)}</td><td>${tag(item.status)}</td><td>${esc(item.normalRange || '-')}</td></tr>`).join('') || '<tr><td colspan="4">暂无检测项</td></tr>'}</tbody>
    </table>
    <h3>诊断建议</h3>
    <table>
      <thead><tr><th>建议内容</th></tr></thead>
      <tbody>${diagnosis.map((item) => `<tr><td>${esc(typeof item === 'string' ? item : (item.advice || item.title || '-'))}</td></tr>`).join('') || '<tr><td>暂无诊断建议</td></tr>'}</tbody>
    </table>
    <h3>巡检图片</h3>
    ${imageUrl ? `
      <div class="image-box">
        <a href="${esc(imageUrl)}" target="_blank"><img src="${esc(imageUrl)}" alt="巡检图片"></a>
        <div class="detail-cell"><span>图片地址</span><b><a href="${esc(imageUrl)}" target="_blank">新窗口打开</a></b></div>
      </div>
    ` : '<div class="empty">暂无上传图片</div>'}
    <h3>备注</h3>
    <div class="detail-cell"><b>${esc(detail.remark || '暂无备注')}</b></div>
  `;
}
async function loadUsers() {
  const users = await api('/users');
  state.users = users;
  $('usersBody').innerHTML = users.map((u) => `
    <tr>
      <td>${u.id}</td><td>${esc(u.username)}</td><td>${esc(u.name)}</td><td>${tag(u.role)}</td><td>${u.enterpriseId || '-'}</td><td>${tag(u.status)}</td>
      <td>
        <button class="secondary" onclick="editUser(${u.id})">编辑</button>
        ${u.status === 'active'
          ? `<button class="danger" onclick="setUserStatus(${u.id}, 'disabled')">禁用</button>`
          : `<button class="secondary" onclick="setUserStatus(${u.id}, 'active')">启用</button>`}
      </td>
    </tr>`).join('');
}
function resetUserForm() {
  $('userId').value = '';
  $('userAccount').value = '';
  $('userAccount').disabled = false;
  $('userName').value = '';
  $('userRole').value = 'inspector';
  $('userEnterprise').value = state.user?.enterpriseId || 1;
  $('userPassword').value = '';
  $('userFormTitle').textContent = '新增用户';
}
function editUser(id) {
  const user = state.users.find((item) => item.id === id);
  if (!user) return;
  $('userId').value = user.id;
  $('userAccount').value = user.username;
  $('userAccount').disabled = true;
  $('userName').value = user.name;
  $('userRole').value = user.role;
  $('userEnterprise').value = user.enterpriseId || 1;
  $('userPassword').value = '';
  $('userFormTitle').textContent = `编辑用户：${user.username}`;
}
async function saveUser() {
  const id = $('userId').value;
  const payload = {
    name: $('userName').value.trim(),
    role: $('userRole').value,
    enterpriseId: Number($('userEnterprise').value || 1),
  };
  if ($('userPassword').value) payload.password = $('userPassword').value;
  if (id) {
    await api('/users/' + id, { method: 'PUT', body: JSON.stringify(payload) });
  } else {
    payload.username = $('userAccount').value.trim();
    payload.password = $('userPassword').value;
    await api('/users', { method: 'POST', body: JSON.stringify(payload) });
  }
  resetUserForm();
  await loadUsers();
}
async function setUserStatus(id, status) {
  const action = status === 'active' ? '启用' : '禁用';
  if (!confirm(`确认${action}该用户？`)) return;
  await api('/users/' + id + '/status', { method: 'PATCH', body: JSON.stringify({ status }) });
  await loadUsers();
}
async function loadReport() {
  const data = await api(`/reports/monthly?enterpriseId=${$('reportEnterprise').value || 1}&month=${encodeURIComponent($('reportMonth').value || '2026-07')}`);
  $('reportOut').textContent = JSON.stringify(data, null, 2);
}
async function refreshAll() {
  await loadDashboard();
  await Promise.all([loadPacks(), loadBoilers(), loadInspections(), loadUsers(), loadReport()]);
}

document.querySelectorAll('.nav button').forEach((btn) => btn.onclick = () => switchTab(btn.dataset.tab));
$('loginBtn').onclick = () => login().catch(showDebug);
$('refreshBtn').onclick = () => refreshAll().catch(showDebug);
$('createPackBtn').onclick = () => createPack().catch(showDebug);
$('loadPacksBtn').onclick = () => loadPacks().catch(showDebug);
$('createBoilerBtn').onclick = () => createBoiler().catch(showDebug);
$('loadBoilersBtn').onclick = () => loadBoilers().catch(showDebug);
$('loadInspectionsBtn').onclick = () => loadInspections().catch(showDebug);
$('loadUsersBtn').onclick = () => loadUsers().catch(showDebug);
$('saveUserBtn').onclick = () => saveUser().catch(showDebug);
$('resetUserFormBtn').onclick = () => resetUserForm();
$('loadReportBtn').onclick = () => loadReport().catch(showDebug);
setWho();
resetUserForm();
refreshAll().catch(showDebug);
</script>
</body>
</html>
